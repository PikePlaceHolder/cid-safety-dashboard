name = "cid-safety-dashboard"
main = "src/worker.js"
compatibility_date = "2026-07-01"

# Camera snapshots are still captured by a separate GitHub Actions workflow
# (see .github/workflows/camera-snapshots.yml) since Workers can't run ffmpeg
# to pull stills from SDOT's HLS video streams — but GitHub's own `schedule:`
# trigger turned out to be unreliable for this repo (confirmed via direct
# testing: ticks silently no-showed for hours, including a same-day
# near-future test cron). So this Worker's cron now also dispatches that
# workflow via the GitHub API instead of relying on GitHub to self-trigger it.
[triggers]
crons = [
  "0 13 * * *",      # daily SPD data pull
  "8 1-23/3 * * *",  # every 3 hours: dispatch the camera-capture workflow
]

[[d1_databases]]
binding = "DB"
database_name = "cid_safety"
database_id = "e69bb43d-8f07-439d-a85e-c1b7fa643480"

[[r2_buckets]]
binding = "CAMERA_SNAPSHOTS"
bucket_name = "cid-camera-snapshots"

[vars]
# Crime dataset no longer publishes MCPP (confirmed blank as of this build) —
# filtering by beat everywhere instead, same as Terry Stops / Calls for Service.
CID_BEATS = "K3"

# Promise-tracker anchor dates (see README for sourcing)
PROMISE_1_DATE = "2026-02-17"   # State of the City: restore late-night SPD presence in CID
PROMISE_2_DATE = "2026-06-18"   # 12th & Jackson enforcement + LEAD + $1.1M outreach funding
