name: Capture camera snapshots

on:
  schedule:
    # Every 3 hours (8 runs/day/camera), anchored to Seattle midnight.
    # GitHub Actions cron is always UTC; Seattle is UTC-7 during daylight
    # saving (PDT, roughly Mar-Nov), so local 00:00/03:00/06:00/... maps to
    # UTC 07:00/10:00/13:00/.... Once PST (UTC-8) kicks in for the winter,
    # this will drift an hour later than local midnight — revisit then if it
    # matters. To switch to daily, replace with e.g. "8 13 * * *" (13:00 UTC
    # ~ 6am Seattle, matching the Worker's daily data pull).
    # Rough cost: 8x/day x 6 cameras is well within GitHub's free minutes on
    # a public repo; on a private repo budget for ~2000 free min/month and
    # watch usage under Settings > Billing.
    # Minute offset (:08, not :00): GitHub's own docs warn schedule events
    # "can be delayed during periods of high loads... high load times
    # include the start of every hour" — every repo scheduling at :00 piles
    # up at once. Confirmed the hard way: the :00 schedule never fired at
    # all in this repo's first ~15+ min window.
    - cron: "8 1-23/3 * * *"
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure ffmpeg, jq, aws-cli are present
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg jq
          aws --version || (curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip \
            && unzip -q awscliv2.zip && sudo ./aws/install)

      - name: Capture frames and upload to R2 + D1
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: cid-camera-snapshots
        run: bash scripts/capture-snapshots.sh
